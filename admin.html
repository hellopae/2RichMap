<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2RichMap — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --green:#3FB950; --green-light:#56D364; --green-pale:rgba(63,185,80,.14);
      --yellow:#E3B341; --yellow-dark:#D29922; --yellow-pale:rgba(227,179,65,.08);
      --red:#F85149; --red-pale:rgba(248,81,73,.12);
      --blue:#58A6FF; --blue-pale:rgba(88,166,255,.12);
      --gray-50:#0D1117; --gray-100:#161B22; --gray-200:rgba(255,255,255,.08);
      --gray-300:rgba(255,255,255,.15); --gray-500:#8B949E;
      --gray-700:#C9D1D9; --gray-900:#E6EDF3;
      --surface:#161B22; --surface2:#1E2535; --surface3:#21262D;
      --font:'Sarabun',sans-serif; --radius:10px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);min-height:100vh}

    /* ── LOGIN ── */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:var(--surface);border:1px solid var(--gray-200);border-radius:18px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
    .login-logo{font-size:46px;margin-bottom:12px}
    .login-title{font-size:22px;font-weight:800;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--gray-500);margin-bottom:28px}
    .form-inp{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:9px;font-family:var(--font);font-size:14px;outline:none;background:var(--surface3);color:var(--gray-900);transition:border-color .2s;margin-bottom:10px}
    .form-inp:focus{border-color:var(--green)}
    .form-sel{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font);font-size:14px;outline:none;background:var(--surface3);color:var(--gray-900)}
    .form-ta{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font);font-size:14px;outline:none;background:var(--surface3);color:var(--gray-900);resize:vertical;min-height:70px}
    .form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:var(--green)}
    .btn-login{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:9px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
    .btn-login:hover{background:var(--green-light)}
    .login-err{color:var(--red);font-size:13px;margin-bottom:10px;display:none}

    /* ── APP ── */
    #app-screen{display:none}
    .adm-header{background:#0D1117;border-bottom:1px solid rgba(63,185,80,.25);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
    .adm-logo{font-size:16px;font-weight:800;color:var(--green)}
    .adm-logo-sub{font-size:12px;color:var(--gray-500);margin-left:6px}
    .adm-header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
    .hbtn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--gray-200);background:var(--surface3);color:var(--gray-700);text-decoration:none;transition:all .15s}
    .hbtn:hover{border-color:var(--green);color:var(--green)}
    .hbtn-red{background:var(--red-pale);color:var(--red);border-color:transparent}
    .hbtn-red:hover{background:var(--red);color:#fff}

    /* ── LAYOUT ── */
    .adm-body{display:flex;min-height:calc(100vh - 56px)}
    .adm-nav{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--gray-200);padding:12px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;font-weight:500;color:var(--gray-500);cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
    .nav-item:hover{background:var(--surface3);color:var(--gray-900)}
    .nav-item.on{color:var(--green);border-left-color:var(--green);background:var(--green-pale);font-weight:700}
    .nav-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:auto}
    .nav-sep{height:1px;background:var(--gray-200);margin:8px 16px}
    .adm-content{flex:1;padding:24px;min-width:0}

    /* ── PANELS ── */
    .panel{display:none}
    .panel.on{display:block}

    /* ── STATS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
    .stat-card{background:var(--surface);border:1px solid var(--gray-200);border-radius:var(--radius);padding:18px;text-align:center}
    .stat-n{font-size:30px;font-weight:800;color:var(--green)}
    .stat-n.warn{color:var(--yellow-dark)}
    .stat-n.danger{color:var(--red)}
    .stat-l{font-size:12px;color:var(--gray-500);margin-top:3px}

    /* ── SECTION ── */
    .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .sec-title{font-size:16px;font-weight:800}
    .sec-count{font-size:12px;color:var(--gray-500);font-weight:400}

    /* ── ROWS ── */
    .shop-row{background:var(--surface);border:1px solid var(--gray-200);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;transition:border-color .15s}
    .shop-row:hover{border-color:var(--gray-300)}
    .shop-thumb{width:64px;height:48px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--surface3)}
    .shop-info{flex:1;min-width:0}
    .shop-name{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .shop-meta{font-size:11px;color:var(--gray-500)}
    .row-btns{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}

    /* Buttons */
    .btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
    .btn-ok{background:var(--green-pale);color:var(--green)}
    .btn-ok:hover{background:var(--green);color:#fff}
    .btn-del{background:var(--red-pale);color:var(--red)}
    .btn-del:hover{background:var(--red);color:#fff}
    .btn-edit{background:var(--blue-pale);color:var(--blue)}
    .btn-edit:hover{background:var(--blue);color:#fff}
    .btn-rej{background:rgba(227,179,65,.15);color:var(--yellow-dark)}
    .btn-rej:hover{background:var(--yellow-dark);color:#fff}

    /* ── EDIT MODAL ── */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--gray-200);border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
    .modal-title{font-size:17px;font-weight:800;margin-bottom:18px}
    .modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--surface3);border:none;cursor:pointer;color:var(--gray-700);font-size:13px;display:flex;align-items:center;justify-content:center}
    .modal-close:hover{background:var(--gray-200)}
    .modal-tabs{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:16px}
    .modal-tab{padding:9px 16px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
    .modal-tab.on{color:var(--green);border-bottom-color:var(--green)}
    .tab-panel{display:none}
    .tab-panel.on{display:block}
    .form-g{margin-bottom:14px}
    .form-lbl{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:5px}
    .req{color:var(--red);margin-left:2px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn-primary{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:9px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
    .btn-primary:hover{background:var(--green-light)}
    .btn-secondary{width:100%;padding:10px;background:transparent;color:var(--gray-500);border:1.5px solid var(--gray-200);border-radius:9px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .15s}
    .btn-secondary:hover{border-color:var(--red);color:var(--red)}

    /* Pin map */
    #pin-map{width:100%;height:200px;border-radius:10px;border:1.5px solid var(--gray-200);margin-top:6px;cursor:crosshair}
    .pin-status{font-size:12px;color:var(--gray-500);margin-top:4px;display:flex;align-items:center;gap:4px}
    .pin-status.set{color:var(--green)}

    /* Menu items in edit */
    .menu-item-row{display:flex;gap:8px;align-items:center;padding:8px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:6px;background:var(--surface3)}
    .menu-thumb-sm{width:48px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
    .menu-thumb-wrap{position:relative;width:52px;height:42px;flex-shrink:0;cursor:pointer;border-radius:6px;overflow:hidden;background:var(--surface2);border:1.5px dashed var(--gray-300)}
    .menu-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .menu-thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;opacity:0;transition:opacity .15s}
    .menu-thumb-wrap:hover .menu-thumb-overlay{opacity:1}
    .btn-upload-img{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:7px;border:1px solid var(--gray-300);background:var(--surface3);color:var(--gray-700);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s;flex-shrink:0}
    .btn-upload-img:hover{border-color:var(--green);color:var(--green)}
    .rev-row{display:flex;gap:8px;align-items:flex-start;padding:10px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:6px;background:var(--surface3)}

    /* Posts */
    .post-row{background:var(--surface);border:1px solid var(--gray-200);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
    .post-info{flex:1;min-width:0}
    .post-title{font-size:13px;font-weight:700;margin-bottom:3px}
    .post-body-preview{font-size:12px;color:var(--gray-500);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .post-meta{font-size:11px;color:var(--gray-500);margin-top:4px}
    .post-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:4px}

    /* Image preview */
    .cover-preview{margin-top:8px;border-radius:8px;overflow:hidden;display:none}
    .cover-preview img{width:100%;height:130px;object-fit:cover;display:block}

    /* Value stars */
    .val-pick{display:flex;gap:6px;margin-top:4px}
    .val-pick i{font-size:24px;color:var(--gray-300);cursor:pointer;transition:color .1s}
    .val-pick i.on{color:var(--yellow-dark)}

    /* Empty */
    .empty-state{text-align:center;padding:40px 20px;color:var(--gray-500)}
    .empty-state i{font-size:36px;color:var(--gray-300);display:block;margin-bottom:12px}

    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#E6EDF3;color:#0D1117;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;font-family:var(--font)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Pill */
    .pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-block;margin-left:4px}
    .pill-ok{background:var(--green-pale);color:var(--green)}
    .pill-wait{background:rgba(227,179,65,.15);color:var(--yellow-dark)}

    /* ── MOBILE NAV ── */
    .mob-menu-btn{display:none;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--gray-200);border-radius:8px;background:var(--surface3);cursor:pointer;color:var(--gray-700);font-size:16px;flex-shrink:0}
    .nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300}
    .nav-overlay.on{display:block}
    @media(max-width:767px){
      .mob-menu-btn{display:flex}
      .adm-nav{display:none;position:fixed;top:56px;left:0;bottom:0;z-index:400;width:240px;box-shadow:4px 0 20px rgba(0,0,0,.4)}
      .adm-nav.mob-open{display:block}
      .adm-content{padding:16px}
      .form-row{grid-template-columns:1fr}
      .shop-thumb{display:none}
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🛡️</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">2RichMap — จัดการร้านค้าและเนื้อหา</div>
    <div class="login-err" id="pw-err">Email หรือ Password ไม่ถูกต้อง</div>
    <input type="email" class="form-inp" id="em-input" placeholder="Admin Email" onkeydown="if(event.key==='Enter')checkPw()" style="margin-bottom:8px">
    <input type="password" class="form-inp" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn-login" id="btn-login" onclick="checkPw()"><i class="fa fa-unlock"></i> เข้าสู่ระบบ</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header class="adm-header">
    <button class="mob-menu-btn" onclick="toggleMobNav()"><i class="fa fa-bars"></i></button>
    <span style="font-size:20px">🛡️</span>
    <span class="adm-logo">2RichMap</span>
    <span class="adm-logo-sub">Admin Panel</span>
    <div class="adm-header-right">
      <a class="hbtn" href="index.html"><i class="fa fa-map-location-dot"></i> ดูแผนที่</a>
      <button class="hbtn hbtn-red" onclick="logout()"><i class="fa fa-right-from-bracket"></i> ออก</button>
    </div>
  </header>

  <div class="nav-overlay" id="nav-overlay" onclick="closeMobNav()"></div>

  <div class="adm-body">
    <!-- SIDEBAR NAV -->
    <nav class="adm-nav" id="adm-nav">
      <div class="nav-item on" onclick="showPanel('dashboard',this)"><i class="fa fa-gauge" style="width:16px"></i> ภาพรวม</div>
      <div class="nav-item" onclick="showPanel('shops',this)"><i class="fa fa-store" style="width:16px"></i> ร้านทั้งหมด</div>
      <div class="nav-sep"></div>
      <div class="nav-item" onclick="showPanel('add',this)"><i class="fa fa-plus-circle" style="width:16px"></i> เพิ่มร้านใหม่</div>
      <div class="nav-sep"></div>
      <div class="nav-item" onclick="showPanel('posts',this)"><i class="fa fa-comments" style="width:16px"></i> กระดานข่าว</div>
      <div class="nav-item" onclick="showPanel('reports',this)"><i class="fa fa-flag" style="width:16px;color:var(--red)"></i> รายงานปัญหา <span class="nav-badge" id="nav-rpt-cnt" style="background:var(--red);display:none">0</span></div>
    </nav>

    <!-- CONTENT -->
    <main class="adm-content">

      <!-- DASHBOARD -->
      <div class="panel on" id="panel-dashboard">
        <div class="stats-grid" id="dash-stats"></div>
      </div>

      <!-- ALL SHOPS -->
      <div class="panel" id="panel-shops">
        <div class="sec-head">
          <span class="sec-title">ร้านทั้งหมด</span>
          <span class="sec-count" id="shops-count"></span>
        </div>
        <div style="margin-bottom:14px">
          <input type="text" class="form-inp" id="shop-search" placeholder="ค้นหาร้าน..." oninput="renderShopsList()" style="max-width:320px;margin-bottom:0">
        </div>
        <div id="shops-list"></div>
      </div>

      <!-- ADD SHOP -->
      <div class="panel" id="panel-add">
        <div class="sec-head"><span class="sec-title">เพิ่มร้านใหม่ (Admin)</span></div>
        <div style="max-width:580px">
          <div class="form-g">
            <label class="form-lbl">ชื่อร้าน<span class="req">*</span></label>
            <input type="text" class="form-inp" id="a-name" placeholder="เช่น ข้าวแกงป้าแดง">
          </div>
          <div class="form-row">
            <div class="form-g">
              <label class="form-lbl">หมวดหมู่<span class="req">*</span></label>
              <select class="form-sel" id="a-cat">
                <option value="">-- เลือก --</option>
                <option value="street">🍢 Street Food</option>
                <option value="restaurant">🍜 ร้านอาหาร</option>
                <option value="vendor">🛒 แผงลอย</option>
                <option value="market">🏪 ตลาดนัด</option>
                <option value="convenience">🏬 สะดวกซื้อ</option>
              </select>
            </div>
            <div class="form-g">
              <label class="form-lbl">ย่าน/ที่อยู่<span class="req">*</span></label>
              <input type="text" class="form-inp" id="a-loc" placeholder="เช่น สาทร, สีลม">
            </div>
          </div>
          <div class="form-row">
            <div class="form-g">
              <label class="form-lbl">ราคาต่ำสุด (฿)</label>
              <input type="number" class="form-inp" id="a-min" placeholder="35">
            </div>
            <div class="form-g">
              <label class="form-lbl">ราคาสูงสุด (฿)</label>
              <input type="number" class="form-inp" id="a-max" placeholder="80">
            </div>
          </div>
          <div class="form-row">
            <div class="form-g">
              <label class="form-lbl">เวลาเปิด-ปิด</label>
              <input type="text" class="form-inp" id="a-hours" placeholder="08:00-20:00">
            </div>
            <div class="form-g">
              <label class="form-lbl">ที่จอดรถ</label>
              <select class="form-sel" id="a-park">
                <option value="no">❌ ไม่มี</option>
                <option value="yes">✅ มี</option>
                <option value="nearby">🅿️ ใกล้เคียง</option>
              </select>
            </div>
          </div>
          <div class="form-g">
            <label class="form-lbl">ความคุ้มค่า (1-5)</label>
            <div class="val-pick" id="a-val-pick">
              <i class="fa fa-star" data-v="1" onclick="pickAddVal(1)"></i>
              <i class="fa fa-star" data-v="2" onclick="pickAddVal(2)"></i>
              <i class="fa fa-star" data-v="3" onclick="pickAddVal(3)"></i>
              <i class="fa fa-star" data-v="4" onclick="pickAddVal(4)"></i>
              <i class="fa fa-star" data-v="5" onclick="pickAddVal(5)"></i>
            </div>
          </div>
          <div class="form-g">
            <label class="form-lbl">รูปหน้าปก</label>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="text" class="form-inp" id="a-cover" placeholder="URL หรืออัปโหลดรูป" oninput="previewAddCover()" style="flex:1">
              <button class="btn-upload-img" onclick="pickImg('add-cover')"><i class="fa fa-upload"></i> อัปโหลด</button>
            </div>
            <div class="cover-preview" id="a-cover-preview"><img id="a-cover-img" alt=""></div>
          </div>
          <div class="form-g">
            <label class="form-lbl">คำอธิบายร้าน</label>
            <textarea class="form-ta" id="a-desc" placeholder="บอกลูกค้าว่าเมนูเด็ดคืออะไร..."></textarea>
          </div>
          <div class="form-g">
            <label class="form-lbl">📍 ตำแหน่งร้าน<span class="req">*</span></label>
            <div style="display:flex;gap:8px;margin-bottom:6px">
              <input type="text" class="form-inp" id="a-addr" placeholder="พิมพ์ที่อยู่แล้วกด Enter หรือคลิกบนแผนที่" onkeydown="if(event.key==='Enter'){event.preventDefault();searchAddAddr()}" style="flex:1;margin-bottom:0">

<script>
// ── FIREBASE ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAV6uKkVi2jFIoo-37Ei0l0ZCXgH-oirbw",
  authDomain: "richmap-eb39a.firebaseapp.com",
  databaseURL: "https://richmap-eb39a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "richmap-eb39a",
  storageBucket: "richmap-eb39a.firebasestorage.app",
  messagingSenderId: "841092682932",
  appId: "1:841092682932:web:da57786848f3cde2e833e1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── CONFIG ──────────────────────────────────────────────
const CAT = {
  street:     {label:'Street Food', color:'#FF7043', icon:'🍢'},
  restaurant: {label:'ร้านอาหาร',   color:'#58A6FF', icon:'🍜'},
  vendor:     {label:'แผงลอย',      color:'#A371F7', icon:'🛒'},
  market:     {label:'ตลาดนัด',     color:'#E3B341', icon:'🏪'},
  convenience:{label:'สะดวกซื้อ',  color:'#3FB950', icon:'🏬'}
};
const PARKING = {yes:'✅ มีที่จอด', no:'❌ ไม่มี', nearby:'🅿️ ใกล้เคียง'};

// ── STATE ────────────────────────────────────────────────
let shops = [], pendingShops = [], posts = [], reports = [];
let reviews = {}; // {shopId: {fbKey: {name,stars,text,date}}}
let shopFbKeys = {}; // {shopId: firebaseKey} — ใช้ update/delete เฉพาะร้าน
let reportFbKeys = {}; // {reportId: firebaseKey} — ใช้ delete เฉพาะ report
let postFbKeys = {}; // {postId: firebaseKey} — ใช้ update/delete เฉพาะโพสต์
let pendingFbKeys = {}; // {shopId: firebaseKey} — ใช้ approve/reject เฉพาะร้าน pending
let _adminInited = false; // กัน enterAdmin() ถูกเรียกซ้ำ
let editingId = null;
let addPinLat = null, addPinLng = null, addPinMap = null, addPinMarker = null;
let addMenus = [];
let addVal = 0;

// ── AUTH ─────────────────────────────────────────────────
async function enterAdmin() {
  await loadData();
  renderAll();
  setTimeout(initAddMap, 400);
  // Real-time listener สำหรับ reports — อัปเดตทันทีไม่ต้อง refresh
  db.ref('reports').on('value', snap => {
    const val = snap.val();
    reports = []; reportFbKeys = {};
    if (val) {
      const entries = Array.isArray(val) ? val.map((r,i)=>[String(i),r]) : Object.entries(val);
      entries.forEach(([key, r]) => { if (r) { reports.push(r); if (r.id) reportFbKeys[String(r.id)] = key; } });
    }
    updateReportBadge();
    // Re-render ถ้า panel reports เปิดอยู่
    const panel = document.getElementById('panel-reports');
    if (panel && panel.classList.contains('on')) renderReports();
  });
}
async function checkPw() {
  const email = document.getElementById('em-input').value.trim();
  const pw = document.getElementById('pw-input').value;
  const errEl = document.getElementById('pw-err');
  const btn = document.getElementById('btn-login');
  errEl.style.display = 'none';
  if (!email || !pw) { errEl.textContent = 'กรุณากรอก Email และ Password'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...';
  try {
    await firebase.auth().signInWithEmailAndPassword(email, pw);
    // onAuthStateChanged จะจัดการเปิด admin panel อัตโนมัติ
  } catch(e) {
    const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
      ? 'Email หรือ Password ไม่ถูกต้อง'
      : (e.code === 'auth/invalid-email' ? 'รูปแบบ Email ไม่ถูกต้อง' : 'เข้าสู่ระบบไม่สำเร็จ: ' + e.message);
    errEl.textContent = msg;
    errEl.style.display = 'block';
    document.getElementById('pw-input').value = '';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-unlock"></i> เข้าสู่ระบบ';
  }
}
function logout() {
  _adminInited = false;
  firebase.auth().signOut();
}
// ── ติดตาม auth state — จัดการ login/logout อัตโนมัติ ──
firebase.auth().onAuthStateChanged(async user => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    if (!_adminInited) { _adminInited = true; await enterAdmin(); }
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    _adminInited = false;
    const btn = document.getElementById('btn-login');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa fa-unlock"></i> เข้าสู่ระบบ'; }
  }
});

function toggleMobNav() {
  const nav = document.getElementById('adm-nav');
  const overlay = document.getElementById('nav-overlay');
  const open = nav.classList.toggle('mob-open');
  overlay.classList.toggle('on', open);
}
function closeMobNav() {
  document.getElementById('adm-nav').classList.remove('mob-open');
  document.getElementById('nav-overlay').classList.remove('on');
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPw();
});

// ── DATA ─────────────────────────────────────────────────
function loadData() {
  return new Promise(resolve => {
    Promise.all([
      db.ref('shops').once('value'),
      db.ref('pendingShops').once('value'),
      db.ref('posts').once('value'),
      db.ref('reports').once('value'),
      db.ref('reviews').once('value')
    ]).then(([shopsSnap, pendingSnap, postsSnap, reportsSnap, reviewsSnap]) => {
      const sv = shopsSnap.val();
      shops = []; shopFbKeys = {};
      if (sv) {
        const entries = Array.isArray(sv)
          ? sv.map((s, i) => [String(i), s])
          : Object.entries(sv);
        entries.forEach(([key, s]) => {
          if (s) { shops.push(s); if (s.id) shopFbKeys[String(s.id)] = key; }
        });
      }
      const pend = pendingSnap.val();
      pendingShops = []; pendingFbKeys = {};
      if (pend) {
        const pEntries = Array.isArray(pend) ? pend.map((s,i)=>[String(i),s]) : Object.entries(pend);
        pEntries.forEach(([key, s]) => { if (s) { pendingShops.push(s); if (s.id) pendingFbKeys[String(s.id)] = key; } });
      }
      const pv = postsSnap.val();
      posts = []; postFbKeys = {};
      if (pv) {
        const pEntries = Array.isArray(pv) ? pv.map((p,i)=>[String(i),p]) : Object.entries(pv);
        pEntries.forEach(([key, p]) => {
          if (p) {
            const post = { ...p, comments: p.comments ? (Array.isArray(p.comments) ? p.comments : Object.values(p.comments)) : [], votes: p.votes||0 };
            posts.push(post);
            if (p.id) postFbKeys[String(p.id)] = key;
          }
        });
      }
      const rv = reportsSnap.val();
      reports = []; reportFbKeys = {};
      if (rv) {
        const rEntries = Array.isArray(rv) ? rv.map((r,i)=>[String(i),r]) : Object.entries(rv);
        rEntries.forEach(([key, r]) => { if (r) { reports.push(r); if (r.id) reportFbKeys[String(r.id)] = key; } });
      }
      reviews = reviewsSnap.val() || {};
      resolve();
    });
  });
}
function saveData() {
  db.ref('shops').set(shops);
  db.ref('posts').set(posts);
  db.ref('reports').set(reports);
}

// ── NAVIGATION ───────────────────────────────────────────
function showPanel(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById(`panel-${id}`).classList.add('on');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
  if (el) el.classList.add('on');
  closeMobNav();
  // Render on demand
  if (id === 'dashboard') renderDashboard();
  if (id === 'pending') renderPending();
  if (id === 'shops') renderShopsList();
  if (id === 'posts') renderPosts();
  if (id === 'reports') renderReports();
  if (id === 'add') setTimeout(()=> { if(addPinMap) addPinMap.invalidateSize(); }, 300);
}

// ── RENDER ALL ───────────────────────────────────────────
function renderAll() {
  renderDashboard();
  updateBadges();
  updateReportBadge();
}

function updateBadges() { /* pending removed */ }

function updateReportBadge() {
  const cnt = reports.filter(r => !r.resolved).length;
  const el = document.getElementById('nav-rpt-cnt');
  if (el) { el.textContent = cnt; el.style.display = cnt ? 'inline-block' : 'none'; }
}

// ── DASHBOARD ────────────────────────────────────────────
function renderDashboard() {
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-n">${shops.length}</div><div class="stat-l">ร้านทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-n">${posts.length}</div><div class="stat-l">กระดานข่าว</div></div>
    <div class="stat-card"><div class="stat-n">${shops.reduce((a,s)=>a+(s.reviews||0),0)}</div><div class="stat-l">รีวิวทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--red)">${reports.filter(r=>!r.resolved).length}</div><div class="stat-l">รายงานปัญหา</div></div>`;
}

// ── PENDING ──────────────────────────────────────────────
function renderPending() {
  document.getElementById('pend-count').textContent = `${pendingShops.length} รายการ`;
  document.getElementById('pending-list').innerHTML = pendingShops.length
    ? pendingShops.map(s => shopRowHtml(s, true)).join('')
    : '<div class="empty-state"><i class="fa fa-check-circle"></i>ไม่มีร้านรออนุมัติ ✅</div>';
}

function shopRowHtml(s, isPending = false) {
  const c = CAT[s.cat] || {icon:'🍽️', color:'#666'};
  const p = s.priceMin === s.priceMax ? `${s.priceMin}฿` : `${s.priceMin}-${s.priceMax}฿`;
  const btns = isPending
    ? `<button class="btn btn-ok" onclick="approve('${s.id}')"><i class="fa fa-check"></i> อนุมัติ</button>
       <button class="btn btn-rej" onclick="reject('${s.id}')"><i class="fa fa-times"></i> ปฏิเสธ</button>`
    : `<button class="btn btn-edit" onclick="openEdit('${s.id}')"><i class="fa fa-pen"></i> แก้ไข</button>
       <button class="btn btn-del" onclick="delShop('${s.id}')"><i class="fa fa-trash"></i> ลบ</button>`;
  return `<div class="shop-row">
    <img class="shop-thumb" src="${s.cover||''}" onerror="this.style.background='var(--surface3)'" alt="">
    <div class="shop-info">
      <div class="shop-name">${c.icon} ${s.name}${isPending?'<span class="pill pill-wait">รออนุมัติ</span>':''}</div>
      <div class="shop-meta">${s.location} · ${p} · คุ้มค่า ${s.value||0}/5 · ${PARKING[s.parking]||''}</div>
      ${s.hours?`<div class="shop-meta">⏰ ${s.hours}</div>`:''}
    </div>
    <div class="row-btns">${btns}</div>
  </div>`;
}

async function approve(id) {
  id = String(id);
  const fbKey = pendingFbKeys[id];
  if (!fbKey) { await loadData(); }
  const s = pendingShops.find(x => String(x.id) === id);
  if (!s) { showToast('❌ ไม่พบร้านในคิว'); return; }
  const approved = {...s, status: 'approved'};
  try {
    await db.ref('shops').push(approved);
    await db.ref('pendingShops').child(pendingFbKeys[id] || fbKey).remove();
    pendingShops = pendingShops.filter(x => String(x.id) !== id);
    renderDashboard(); renderPending(); renderShopsList(); updateBadges();
    showToast(`✅ อนุมัติ "${s.name}" แล้ว`);
  } catch(e) { showToast('❌ เกิดข้อผิดพลาด: ' + e.message); }
}
async function reject(id) {
  id = String(id);
  const fbKey = pendingFbKeys[id];
  if (!fbKey) { await loadData(); }
  const s = pendingShops.find(x => String(x.id) === id);
  if (!s) { showToast('❌ ไม่พบร้านในคิว'); return; }
  try {
    await db.ref('pendingShops').child(pendingFbKeys[id] || fbKey).remove();
    pendingShops = pendingShops.filter(x => String(x.id) !== id);
    renderDashboard(); renderPending(); updateBadges();
    showToast(`🚫 ปฏิเสธ "${s.name}" แล้ว`);
  } catch(e) { showToast('❌ เกิดข้อผิดพลาด: ' + e.message); }
}

// ── ALL SHOPS ────────────────────────────────────────────
function renderShopsList() {
  const q = (document.getElementById('shop-search')?.value || '').toLowerCase();
  const list = shops.filter(s => !q || s.name.toLowerCase().includes(q) || s.location.toLowerCase().includes(q));
  document.getElementById('shops-count').textContent = `${list.length} ร้าน`;
  document.getElementById('shops-list').innerHTML = list.length
    ? list.map(s => shopRowHtml(s, false)).join('')
    : '<div class="empty-state"><i class="fa fa-store"></i>ไม่พบร้านที่ค้นหา</div>';
}

async function delShop(id) {
  id = String(id);
  await loadData();
  const s = shops.find(x => String(x.id) === id); if (!s) return;
  if (!confirm(`ลบ "${s.name}" ?`)) return;
  const fbKey = shopFbKeys[id];
  if (!fbKey) { showToast('❌ ไม่พบ key ของร้านนี้'); return; }
  await db.ref('shops').child(fbKey).remove()
    .catch(err => { showToast('❌ ลบไม่สำเร็จ: ' + (err.code||err.message)); return; });
  delete shopFbKeys[id];
  shops = shops.filter(x => String(x.id) !== id);
  renderShopsList(); renderDashboard();
  showToast(`ลบ "${s.name}" แล้ว`);
}

// ── EDIT SHOP ────────────────────────────────────────────
async function openEdit(id) {
  id = String(id);
  await loadData();
  const s = shops.find(x => String(x.id) === id); if (!s) return;
  editingId = id;
  document.getElementById('edit-modal-title').textContent = `✏️ ${s.name}`;
  document.getElementById('e-name').value = s.name;
  document.getElementById('e-cat').value = s.cat;
  document.getElementById('e-loc').value = s.location;
  document.getElementById('e-min').value = s.priceMin;
  document.getElementById('e-max').value = s.priceMax;
  document.getElementById('e-value').value = s.value || 0;
  document.getElementById('e-park').value = s.parking || 'no';
  document.getElementById('e-hours').value = s.hours || '';
  document.getElementById('e-cover').value = s.cover || '';
  document.getElementById('e-desc').value = s.desc || '';
  document.getElementById('e-wongnai').value = s.wongnai || '';
  const prev = document.getElementById('e-cover-preview');
  const img = document.getElementById('e-cover-img');

// ── IMAGE UPLOAD ─────────────────────────────────────────
function compressImage(file, maxW=700, maxH=500, quality=0.78) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
let _imgTarget = null;
function pickImg(type, idx) {
  _imgTarget = {type, idx};
  document.getElementById('global-img-input').click();
}
async function handleImgUpload(input) {
  if (!input.files[0] || !_imgTarget) return;
  showToast('กำลังบีบอัดรูป...');
  const dataUrl = await compressImage(input.files[0]);
  const {type, idx} = _imgTarget;
  if (type === 'edit-menu') {
    const s = shops.find(x => String(x.id) === String(editingId));
    if (s && s.menus[idx]) { s.menus[idx].img = dataUrl; renderEditMenus(s); }
  } else if (type === 'add-menu') {
    collectAddMenuEntries();
    if (addMenuEntries[idx]) { addMenuEntries[idx].img = dataUrl; renderAddMenus(); }
  } else if (type === 'edit-cover') {
    document.getElementById('e-cover').value = dataUrl;
    document.getElementById('e-cover-img').src = dataUrl;
    document.getElementById('e-cover-preview').style.display = 'block';
  } else if (type === 'add-cover') {
    document.getElementById('a-cover').value = dataUrl;
    document.getElementById('a-cover-img').src = dataUrl;
    document.getElementById('a-cover-preview').style.display = 'block';
  }
  input.value = '';
  showToast('อัปโหลดรูปเรียบร้อย ✅');
}

let addPinInited = false;
function initAddMap() {
  if (addPinInited) { addPinMap.invalidateSize(); return; }
  addPinMap = L.map('pin-map', {zoomControl: true}).setView([13.756, 100.502], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(addPinMap);
  addPinMap.on('click', e => {
    addPinLat = e.latlng.lat; addPinLng = e.latlng.lng;
    if (addPinMarker) addPinMap.removeLayer(addPinMarker);
    addPinMarker = L.marker([addPinLat, addPinLng], {draggable: true}).addTo(addPinMap);
    addPinMarker.on('dragend', ev => {
      addPinLat = ev.target.getLatLng().lat;
      addPinLng = ev.target.getLatLng().lng;
      updateAddPinStatus();
    });
    updateAddPinStatus();
  });
  addPinInited = true;
}

async function searchAddAddr() {
  const q = document.getElementById('a-addr').value.trim();
  if (!q) { showToast('กรุณาพิมพ์ที่อยู่ก่อน'); return; }
  showToast('กำลังค้นหา...');
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ' ประเทศไทย')}&format=json&limit=1&accept-language=th`;
    const res = await fetch(url, {headers: {'Accept-Language': 'th'}});
    const data = await res.json();
    if (data.length > 0) {
      const {lat, lon} = data[0];
      addPinLat = parseFloat(lat); addPinLng = parseFloat(lon);
      addPinMap.setView([addPinLat, addPinLng], 16);
      if (addPinMarker) addPinMap.removeLayer(addPinMarker);
      addPinMarker = L.marker([addPinLat, addPinLng], {draggable: true}).addTo(addPinMap);
      addPinMarker.on('dragend', ev => {
        addPinLat = ev.target.getLatLng().lat;
        addPinLng = ev.target.getLatLng().lng;
        updateAddPinStatus();
      });
      updateAddPinStatus();
      showToast('พบตำแหน่งแล้ว 📍');
    } else showToast('ไม่พบที่อยู่นี้');
  } catch(e) { showToast('ค้นหาไม่สำเร็จ ลองคลิกบนแผนที่แทน'); }
}

function updateAddPinStatus() {
  const st = document.getElementById('add-pin-status');

    st.className = 'pin-status set';
    st.innerHTML = `<i class="fa fa-check-circle"></i> ปักหมุดแล้ว: ${addPinLat.toFixed(5)}, ${addPinLng.toFixed(5)}`;

async function deleteComment(postId, commentIdx) {

  p.comments.splice(commentIdx, 1);

  const allShop = [...unresolvedShop, ...shopReports.filter(r=>r.resolved)];
  document.getElementById('reports-list').innerHTML = allShop.length
    ? `<div style="font-size:13px;font-weight:700;color:var(--gray-700);margin:12px 0 8px;display:flex;align-items:center;gap:6px">
        <i class="fa fa-flag"></i> รายงานข้อมูลร้านผิด (${unresolvedShop.length})
      </div>`+allShop.map(r => `
      <div class="shop-row" style="${r.resolved?'opacity:.5':''}">
        <div class="shop-info">
          <div class="shop-name">${r.resolved?'<span style="color:var(--green);font-size:11px">✅ แก้ไขแล้ว</span> ':''}<strong>${r.shopName||'ไม่ระบุ'}</strong></div>
          <div class="shop-meta" style="margin-top:4px;line-height:1.6">${r.message}</div>
          <div class="shop-meta" style="margin-top:3px;font-size:10px;color:var(--gray-500)">${r.submittedAt||''}</div>
        </div>
        <div class="row-btns">
          ${!r.resolved?`<button class="btn btn-ok" onclick="resolveReport('${r.id}')"><i class="fa fa-check"></i> แก้ไขแล้ว</button>`:''}
          <button class="btn btn-del" onclick="deleteReport('${r.id}')"><i class="fa fa-trash"></i></button>
        </div>
      </div>`).join('')
    : (reviewReports.length ? '' : '<div class="empty-state"><i class="fa fa-flag"></i>ไม่มีรายงานปัญหา ✅</div>');
}

async function deleteReportedReview(reportId, shopId, reviewKey) {
  if(!confirm('ลบรีวิวนี้ออกจากร้านด้วยไหมครับ?')) return;
  if(reviewKey) {
    await db.ref('reviews').child(String(shopId)).child(String(reviewKey)).remove();
    if(reviews[String(shopId)]) delete reviews[String(shopId)][String(reviewKey)];
  }
  const fbKey = reportFbKeys[String(reportId)];
  if (fbKey) await db.ref('reports').child(fbKey).remove();
  showToast('ลบรีวิวแล้ว ✅');
}

async function dismissReviewReport(reportId) {
  const fbKey = reportFbKeys[String(reportId)];
  if (!fbKey) { showToast('❌ ไม่พบรายงานนี้'); return; }
  await db.ref('reports').child(fbKey).update({resolved: true});
  showToast('เก็บรีวิวไว้แล้ว ✅');
}

async function resolveReport(id) {
  id = String(id);
  const fbKey = reportFbKeys[id];
  if (!fbKey) { showToast('❌ ไม่พบรายงานนี้'); return; }
  await db.ref('reports').child(fbKey).update({resolved: true});
  showToast('✅ ทำเครื่องหมายแก้ไขแล้ว');
}

async function deleteReport(id) {
  id = String(id);
  const fbKey = reportFbKeys[id];
  if (!fbKey) { showToast('❌ ไม่พบรายงานนี้'); return; }
  if (!confirm('ลบรายงานนี้?')) return;
  await db.ref('reports').child(fbKey).remove();
  showToast('ลบรายงานแล้ว');
}

// ── TOAST ────────────────────────────────────────────────
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ─────────────────────────────────────────────────
renderAddMenus();
</script>
